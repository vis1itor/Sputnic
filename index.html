<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sputnik · Чаты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- БАЗА ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0f0a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #e2f0e8;
    }

    /* ----- КАРТОЧКА ----- */
    .app {
      max-width: 900px;
      width: 100%;
      background: rgba(18, 40, 30, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 2.8rem;
      padding: 2.2rem 2.5rem 2.5rem;
      border: 1px solid rgba(80, 200, 120, 0.08);
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    /* ----- ШАПКА ----- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo i {
      font-size: 2rem;
      color: #6fcf97;
      filter: drop-shadow(0 0 12px rgba(60,210,130,0.2));
    }
    .logo span {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(145deg, #e6f7ed 20%, #6fcf97 70%, #2d8f4e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(30,70,50,0.3);
      padding: 0.3rem 1.2rem 0.3rem 0.8rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.08);
      font-size: 0.9rem;
    }
    .user-badge i {
      color: #6fcf97;
      font-size: 1.2rem;
    }
    .user-badge .email {
      color: #b5dac8;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      background: none;
      border: none;
      color: rgba(130,200,160,0.3);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      padding: 0.2rem 0.5rem;
    }
    .btn-logout:hover { color: #f7a9a9; }

    /* ----- КОНТЕНТ (две колонки) ----- */
    .content {
      display: flex;
      gap: 2rem;
      flex: 1;
      min-height: 320px;
    }

    /* --- ЛЕВАЯ КОЛОНКА: список чатов --- */
    .chat-list {
      flex: 1;
      min-width: 180px;
      background: rgba(20,50,35,0.2);
      border-radius: 1.8rem;
      padding: 1.2rem 0.8rem;
      border: 1px solid rgba(80,200,120,0.04);
      max-height: 400px;
      overflow-y: auto;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(80,200,120,0.2); border-radius: 10px; }

    .chat-list-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(130,200,160,0.25);
      padding: 0 0.8rem 0.8rem;
      border-bottom: 1px solid rgba(80,200,120,0.04);
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
    }
    .chat-list-title span { font-weight: 600; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 0.2rem;
      color: #b5dac8;
    }
    .chat-item:hover { background: rgba(60,200,120,0.06); }
    .chat-item.active { background: rgba(60,200,120,0.08); border-left: 3px solid #6fcf97; }
    .chat-item i { color: #6fcf97; font-size: 0.9rem; width: 20px; text-align: center; }
    .chat-item .chat-email {
      font-size: 0.9rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .chat-item .chat-status {
      font-size: 0.6rem;
      color: rgba(130,200,160,0.2);
    }
    .empty-chats {
      text-align: center;
      color: rgba(130,200,160,0.15);
      font-size: 0.9rem;
      padding: 2rem 0;
    }
    .empty-chats i { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.3; }

    /* --- ПРАВАЯ КОЛОНКА: активный чат / добавление --- */
    .chat-area {
      flex: 2;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: rgba(20,50,35,0.15);
      border-radius: 1.8rem;
      padding: 1.2rem 1.2rem 0.8rem;
      border: 1px solid rgba(80,200,120,0.04);
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(80,200,120,0.04);
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .chat-header .partner {
      font-weight: 600;
      color: #daf5e4;
      font-size: 1rem;
    }
    .chat-header .partner i { color: #6fcf97; margin-right: 0.4rem; font-size: 0.8rem; }

    .add-chat-form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.3rem;
    }
    .add-chat-form input {
      flex: 1;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.08);
      background: rgba(20,50,35,0.3);
      color: #e2f0e8;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    .add-chat-form input:focus { border-color: #6fcf97; box-shadow: 0 0 0 3px rgba(60,210,130,0.05); }
    .add-chat-form input::placeholder { color: rgba(160,200,180,0.2); }
    .add-chat-form button {
      padding: 0.6rem 1.4rem;
      border-radius: 60px;
      border: none;
      background: linear-gradient(145deg, #3db86b, #1e8a4a);
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .add-chat-form button:hover { background: linear-gradient(145deg, #4dcd7a, #239a52); transform: translateY(-1px); }

    /* сообщения чата (заглушка) */
    .messages-preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(130,200,160,0.15);
      font-size: 0.85rem;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 120px;
    }
    .messages-preview i { font-size: 2.2rem; opacity: 0.2; }
    .messages-preview .hint { font-size: 0.75rem; color: rgba(130,200,160,0.1); }

    /* ----- СТАТУС / СООБЩЕНИЯ ----- */
    .status-bar {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 60px;
      font-size: 0.8rem;
      background: rgba(20,50,35,0.15);
      border: 1px solid rgba(80,200,120,0.02);
      color: rgba(130,200,160,0.3);
      text-align: center;
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .status-bar.success { color: #8fdeb0; border-color: rgba(60,210,130,0.08); background: rgba(60,200,120,0.03); }
    .status-bar.error { color: #f7a9a9; border-color: rgba(240,120,120,0.08); background: rgba(200,60,60,0.03); }

    /* адаптив */
    @media (max-width: 700px) {
      .app { padding: 1.5rem; border-radius: 2rem; }
      .content { flex-direction: column; gap: 1rem; }
      .chat-list { max-height: 200px; }
      .chat-area { min-height: 200px; }
      .add-chat-form { flex-wrap: wrap; }
      .add-chat-form input { min-width: 120px; }
    }
    @media (max-width: 480px) {
      .header { flex-direction: column; align-items: stretch; gap: 0.5rem; }
      .user-badge { justify-content: space-between; }
      .logo span { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- ШАПКА -->
  <div class="header">
    <div class="logo">
      <i class="fas fa-satellite"></i>
      <span>Sputnik</span>
    </div>
    <div class="user-badge" id="userBadge" style="display:none;">
      <i class="fas fa-user-astronaut"></i>
      <span class="email" id="userEmail">user@mail.com</span>
      <button class="btn-logout" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <!-- КОНТЕНТ -->
  <div class="content">
    <!-- Список чатов -->
    <div class="chat-list" id="chatList">
      <div class="chat-list-title">
        <span><i class="fas fa-comments" style="margin-right: 6px;"></i>Чаты</span>
        <span id="chatCount">0</span>
      </div>
      <div id="chatItems">
        <div class="empty-chats">
          <i class="fas fa-inbox"></i>
          нет чатов
        </div>
      </div>
    </div>

    <!-- Область чата -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="partner" id="activePartner">
          <i class="fas fa-user"></i> выберите чат
        </div>
      </div>

      <!-- Форма добавления нового чата -->
      <div class="add-chat-form">
        <input type="email" id="newChatEmail" placeholder="email собеседника" />
        <button id="addChatBtn"><i class="fas fa-plus"></i> Новый чат</button>
      </div>

      <!-- Заглушка сообщений -->
      <div class="messages-preview" id="messagesPreview">
        <i class="fas fa-comment-dots"></i>
        <span>здесь будут сообщения</span>
        <span class="hint">выберите чат слева</span>
      </div>
    </div>
  </div>

  <!-- Статус-бар -->
  <div class="status-bar" id="statusBar">
    <i class="fas fa-info-circle"></i> готов к работе
  </div>
</div>

<!-- ===== FIREBASE SDK ===== -->
<script type="module">
  // ----- ИМПОРТЫ FIREBASE -----
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    getDocs,
    onSnapshot,
    doc,
    setDoc,
    getDoc,
    serverTimestamp,
    arrayUnion,
    arrayRemove,
    updateDoc,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ----- КОНФИГ -----
  const firebaseConfig = {
    apiKey: "AIzaSyBjvB9O3hsn4en7oexjDNr_Ad30LorEJYA",
    authDomain: "sputnik-e9f74.firebaseapp.com",
    projectId: "sputnik-e9f74",
    storageBucket: "sputnik-e9f74.firebasestorage.app",
    messagingSenderId: "426394306019",
    appId: "1:426394306019:web:df8ea34fef8be3877f4cd6",
    measurementId: "G-C20YYXMCQM"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ----- DOM -----
  const userBadge = document.getElementById('userBadge');
  const userEmailSpan = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');
  const chatItems = document.getElementById('chatItems');
  const chatCount = document.getElementById('chatCount');
  const activePartner = document.getElementById('activePartner');
  const messagesPreview = document.getElementById('messagesPreview');
  const statusBar = document.getElementById('statusBar');
  const addChatBtn = document.getElementById('addChatBtn');
  const newChatEmail = document.getElementById('newChatEmail');

  // ----- СОСТОЯНИЕ -----
  let currentUser = null;
  let currentUserEmail = '';
  let chats = []; // массив { id, email, lastMessage? }
  let activeChatId = null;

  // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
  function setStatus(msg, type = 'info') {
    statusBar.innerHTML = msg;
    statusBar.className = 'status-bar';
    if (type === 'success') statusBar.classList.add('success');
    if (type === 'error') statusBar.classList.add('error');
  }

  function renderChats() {
    if (!chats.length) {
      chatItems.innerHTML = `<div class="empty-chats"><i class="fas fa-inbox"></i>нет чатов</div>`;
      chatCount.textContent = '0';
      return;
    }
    let html = '';
    chats.forEach(chat => {
      const activeClass = chat.id === activeChatId ? 'active' : '';
      html += `
        <div class="chat-item ${activeClass}" data-chatid="${chat.id}">
          <i class="fas fa-user-circle"></i>
          <span class="chat-email">${chat.email}</span>
          <span class="chat-status"><i class="fas fa-circle" style="color: rgba(80,200,120,0.15); font-size: 0.5rem;"></i></span>
        </div>
      `;
    });
    chatItems.innerHTML = html;
    chatCount.textContent = chats.length;

    // клик по чату
    document.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.chatid;
        const found = chats.find(c => c.id === id);
        if (found) {
          activeChatId = id;
          activePartner.innerHTML = `<i class="fas fa-user"></i> ${found.email}`;
          messagesPreview.innerHTML = `
            <i class="fas fa-comment-dots"></i>
            <span>Чат с ${found.email}</span>
            <span class="hint">сообщения будут здесь</span>
          `;
          renderChats();
        }
      });
    });
  }

  // ----- ЗАГРУЗКА ЧАТОВ ИЗ FIRESTORE -----
  async function loadChats(userEmail) {
    if (!userEmail) return;
    try {
      // Ищем все документы, где в массиве participants есть email текущего пользователя
      const q = query(collection(db, 'chats'), where('participants', 'array-contains', userEmail));
      const snapshot = await getDocs(q);
      chats = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        // находим email собеседника
        const other = data.participants.find(p => p !== userEmail);
        chats.push({
          id: doc.id,
          email: other || 'unknown',
          ...data
        });
      });
      renderChats();
      if (chats.length > 0 && !activeChatId) {
        // автоматически выбираем первый чат
        activeChatId = chats[0].id;
        activePartner.innerHTML = `<i class="fas fa-user"></i> ${chats[0].email}`;
        messagesPreview.innerHTML = `
          <i class="fas fa-comment-dots"></i>
          <span>Чат с ${chats[0].email}</span>
          <span class="hint">сообщения будут здесь</span>
        `;
        renderChats();
      }
    } catch (e) {
      console.warn('loadChats error:', e);
    }
  }

  // ----- ДОБАВЛЕНИЕ НОВОГО ЧАТА -----
  async function addNewChat(partnerEmail) {
    if (!currentUserEmail) {
      setStatus('❌ Вы не авторизованы', 'error');
      return;
    }
    if (partnerEmail === currentUserEmail) {
      setStatus('❌ Нельзя создать чат с самим собой', 'error');
      return;
    }
    if (!partnerEmail || !partnerEmail.includes('@')) {
      setStatus('❌ Введите корректный email', 'error');
      return;
    }

    // Проверяем, существует ли уже чат с этим пользователем
    const existing = chats.find(c => c.email === partnerEmail);
    if (existing) {
      setStatus('ℹ️ Чат с этим пользователем уже существует', 'info');
      activeChatId = existing.id;
      activePartner.innerHTML = `<i class="fas fa-user"></i> ${existing.email}`;
      renderChats();
      return;
    }

    try {
      // Создаём новый документ чата
      const chatRef = await addDoc(collection(db, 'chats'), {
        participants: [currentUserEmail, partnerEmail],
        createdAt: serverTimestamp(),
        lastMessage: null,
        lastMessageTime: null
      });

      // Добавляем в локальный список
      const newChat = { id: chatRef.id, email: partnerEmail };
      chats.push(newChat);
      activeChatId = chatRef.id;
      activePartner.innerHTML = `<i class="fas fa-user"></i> ${partnerEmail}`;
      messagesPreview.innerHTML = `
        <i class="fas fa-comment-dots"></i>
        <span>Чат с ${partnerEmail}</span>
        <span class="hint">сообщения будут здесь</span>
      `;
      renderChats();
      setStatus(`✅ Чат с ${partnerEmail} создан`, 'success');
      newChatEmail.value = '';
    } catch (e) {
      console.error('addNewChat error:', e);
      setStatus('❌ Ошибка создания чата', 'error');
    }
  }

  // ----- СЛУШАЕМ ИЗМЕНЕНИЯ ЧАТОВ В РЕАЛЬНОМ ВРЕМЕНИ -----
  function subscribeToChats(userEmail) {
    if (!userEmail) return;
    const q = query(collection(db, 'chats'), where('participants', 'array-contains', userEmail));
    onSnapshot(q, (snapshot) => {
      chats = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        const other = data.participants.find(p => p !== userEmail);
        chats.push({ id: doc.id, email: other || 'unknown', ...data });
      });
      renderChats();
      // Если активный чат удалён — сброс
      if (activeChatId && !chats.find(c => c.id === activeChatId)) {
        activeChatId = null;
        activePartner.innerHTML = `<i class="fas fa-user"></i> выберите чат`;
        messagesPreview.innerHTML = `
          <i class="fas fa-comment-dots"></i>
          <span>выберите чат слева</span>
          <span class="hint">или создайте новый</span>
        `;
      }
      if (chats.length > 0 && !activeChatId) {
        activeChatId = chats[0].id;
        activePartner.innerHTML = `<i class="fas fa-user"></i> ${chats[0].email}`;
        messagesPreview.innerHTML = `
          <i class="fas fa-comment-dots"></i>
          <span>Чат с ${chats[0].email}</span>
          <span class="hint">сообщения будут здесь</span>
        `;
      }
      renderChats();
    }, (error) => {
      console.warn('onSnapshot error:', error);
    });
  }

  // ----- AUTH STATE -----
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      currentUserEmail = user.email;
      userBadge.style.display = 'flex';
      userEmailSpan.textContent = user.email;
      setStatus(`👋 Добро пожаловать, ${user.email}`, 'success');
      // Загружаем чаты
      await loadChats(user.email);
      // Подписываемся на обновления
      subscribeToChats(user.email);
    } else {
      // Не авторизован — показываем форму регистрации
      currentUser = null;
      currentUserEmail = '';
      userBadge.style.display = 'none';
      chatItems.innerHTML = `<div class="empty-chats"><i class="fas fa-lock"></i> войдите для доступа</div>`;
      chatCount.textContent = '0';
      activePartner.innerHTML = `<i class="fas fa-user"></i> не авторизован`;
      messagesPreview.innerHTML = `
        <i class="fas fa-sign-in-alt"></i>
        <span>войдите или зарегистрируйтесь</span>
        <span class="hint">используйте форму ниже</span>
      `;
      // Показываем упрощённую форму регистрации в статусе
      setStatus('🔐 Введите email и пароль для входа / регистрации', 'info');
      // Создаём форму входа/регистрации в статус-баре (временное решение)
      // Но для удобства — показываем поля прямо в статусе
      statusBar.innerHTML = `
        <form id="quickAuthForm" style="display:flex; gap:0.5rem; width:100%; flex-wrap:wrap; justify-content:center;">
          <input type="email" id="authEmail" placeholder="Email" style="padding:0.4rem 0.8rem; border-radius:40px; border:1px solid rgba(80,200,120,0.1); background:rgba(20,50,35,0.3); color:#e2f0e8; font-family:inherit; flex:1; min-width:120px;">
          <input type="password" id="authPassword" placeholder="Пароль (6+)" style="padding:0.4rem 0.8rem; border-radius:40px; border:1px solid rgba(80,200,120,0.1); background:rgba(20,50,35,0.3); color:#e2f0e8; font-family:inherit; flex:1; min-width:100px;">
          <button type="submit" style="padding:0.4rem 1.2rem; border-radius:40px; border:none; background:linear-gradient(145deg,#3db86b,#1e8a4a); color:white; font-weight:600; cursor:pointer;">Войти</button>
        </form>
      `;
      // Обработка формы быстрой авторизации
      document.getElementById('quickAuthForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!email || !password) { setStatus('Заполните все поля', 'error'); return; }
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          setStatus('✅ Аккаунт создан и вход выполнен', 'success');
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            // Пробуем войти
            try {
              const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
              await signInWithEmailAndPassword(auth, email, password);
              setStatus('✅ Добро пожаловать!', 'success');
            } catch (loginErr) {
              setStatus('❌ ' + (loginErr.message || 'Ошибка входа'), 'error');
            }
          } else {
            setStatus('❌ ' + (err.message || 'Ошибка'), 'error');
          }
        }
      });
    }
  });

  // ----- ВЫХОД -----
  logoutBtn.addEventListener('click', async () => {
    try {
      await signOut(auth);
      setStatus('👋 Вы вышли', 'info');
    } catch (e) {
      setStatus('❌ Ошибка выхода', 'error');
    }
  });

  // ----- ДОБАВИТЬ ЧАТ (кнопка) -----
  addChatBtn.addEventListener('click', () => {
    const email = newChatEmail.value.trim();
    addNewChat(email);
  });
  newChatEmail.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addChatBtn.click();
    }
  });

  // Стартовое сообщение
  setStatus('🚀 Sputnik · загружается...', 'info');
</script>
</body>
</html>
