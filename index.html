<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sputnik 💬 Мессенджер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0f1f12, #050d08);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #e2f0e8;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      background: rgba(18, 45, 30, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem 2.5rem;
      border: 1px solid rgba(100, 220, 150, 0.12);
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .logo i {
      font-size: 2.4rem;
      color: #6fcf97;
      filter: drop-shadow(0 0 20px rgba(60,210,130,0.3));
    }
    .logo span {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(145deg, #e6f7ed 20%, #6fcf97 60%, #2d8f4e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(30,70,50,0.25);
      padding: 0.3rem 1.2rem 0.3rem 0.8rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.08);
    }
    .user-badge .email {
      color: #b5dac8;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-logout {
      background: none;
      border: none;
      color: rgba(130,200,160,0.25);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }
    .btn-logout:hover { color: #f7a9a9; }

    .content {
      display: flex;
      gap: 1.8rem;
      flex: 1;
      min-height: 380px;
    }

    .chat-list {
      flex: 0 0 260px;
      background: rgba(20,50,35,0.15);
      border-radius: 2rem;
      padding: 1.2rem 0.6rem;
      border: 1px solid rgba(80,200,120,0.04);
      max-height: 450px;
      overflow-y: auto;
    }
    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(80,200,120,0.15); border-radius: 10px; }

    .chat-list-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(130,200,160,0.2);
      padding: 0 0.8rem 0.8rem;
      border-bottom: 1px solid rgba(80,200,120,0.04);
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.25s;
      margin-bottom: 0.2rem;
      color: #b5dac8;
    }
    .chat-item:hover { background: rgba(60,200,120,0.06); transform: translateX(4px); }
    .chat-item.active { background: rgba(60,200,120,0.08); border-left: 3px solid #6fcf97; }
    .chat-item i { color: #6fcf97; width: 20px; text-align: center; }
    .chat-item .chat-email {
      font-size: 0.9rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .empty-chats {
      text-align: center;
      color: rgba(130,200,160,0.12);
      font-size: 0.9rem;
      padding: 2rem 0;
    }
    .empty-chats i { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; opacity: 0.2; }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(20,50,35,0.1);
      border-radius: 2rem;
      padding: 1.2rem 1.2rem 0.8rem;
      border: 1px solid rgba(80,200,120,0.04);
      min-height: 350px;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(80,200,120,0.04);
      margin-bottom: 0.8rem;
    }
    .chat-header .partner {
      font-weight: 600;
      color: #daf5e4;
      font-size: 1.05rem;
    }
    .chat-header .partner i { color: #6fcf97; margin-right: 0.5rem; }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0.2rem;
      margin-bottom: 0.8rem;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: rgba(80,200,120,0.1); border-radius: 10px; }

    /* ===== СООБЩЕНИЯ ===== */
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: messageIn 0.3s ease;
    }
    
    .message-wrapper.sent {
      align-self: flex-end;
      align-items: flex-end;
    }
    
    .message-wrapper.received {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message {
      padding: 0.6rem 1.2rem;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-wrap: break-word;
      width: 100%;
    }
    
    @keyframes messageIn {
      0% { opacity: 0; transform: translateY(10px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .message.sent {
      background: linear-gradient(145deg, #3db86b, #1e8a4a);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(60,210,130,0.15);
    }
    
    .message.received {
      background: rgba(30,70,50,0.3);
      color: #daf5e4;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(80,200,120,0.05);
    }
    
    .message .msg-time {
      font-size: 0.6rem;
      opacity: 0.4;
      margin-left: 0.6rem;
      display: inline-block;
    }
    
    .message.sent .msg-time { color: rgba(255,255,255,0.5); }
    .message.received .msg-time { color: rgba(130,200,160,0.3); }

    .message .msg-sender {
      font-size: 0.65rem;
      font-weight: 600;
      color: #6fcf97;
      display: block;
      margin-bottom: 0.2rem;
    }
    
    .message.received .msg-sender { color: #8fdeb0; }

    .empty-messages {
      text-align: center;
      color: rgba(130,200,160,0.08);
      font-size: 0.9rem;
      padding: 2rem 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .empty-messages i { font-size: 2.5rem; opacity: 0.15; margin-bottom: 0.5rem; }

    .send-form {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.3rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(80,200,120,0.04);
    }
    .send-form input {
      flex: 1;
      padding: 0.7rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.06);
      background: rgba(20,50,35,0.2);
      color: #e2f0e8;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }
    .send-form input:focus { border-color: #6fcf97; }
    .send-form input::placeholder { color: rgba(160,200,180,0.15); }
    .send-form button {
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      border: none;
      background: linear-gradient(145deg, #3db86b, #1e8a4a);
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .send-form button:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(60,210,130,0.25); }
    .send-form button:disabled { opacity: 0.4; cursor: not-allowed; }

    .add-chat-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .add-chat-row input {
      flex: 1;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.06);
      background: rgba(20,50,35,0.15);
      color: #e2f0e8;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      outline: none;
      min-width: 120px;
    }
    .add-chat-row input:focus { border-color: #6fcf97; }
    .add-chat-row button {
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(80,200,120,0.1);
      background: rgba(60,200,120,0.05);
      color: #b5dac8;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .add-chat-row button:hover { background: rgba(60,200,120,0.1); }

    .status-bar {
      margin-top: 1.2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      background: rgba(20,50,35,0.1);
      border: 1px solid rgba(80,200,120,0.02);
      color: rgba(130,200,160,0.2);
      text-align: center;
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .status-bar.success { color: #8fdeb0; border-color: rgba(60,210,130,0.06); background: rgba(60,200,120,0.03); }
    .status-bar.error { color: #f7a9a9; border-color: rgba(240,120,120,0.06); background: rgba(200,60,60,0.03); }
    .status-bar.info { color: #aac7d9; border-color: rgba(100,180,220,0.06); background: rgba(60,150,200,0.03); }

    @media (max-width: 780px) {
      .app { padding: 1.5rem; border-radius: 2rem; }
      .content { flex-direction: column; gap: 1rem; }
      .chat-list { flex: unset; max-height: 160px; }
      .messages-container { max-height: 250px; }
    }
    @media (max-width: 480px) {
      .header { flex-direction: column; align-items: stretch; gap: 0.5rem; }
      .send-form { flex-wrap: wrap; }
      .send-form button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">
      <i class="fas fa-satellite"></i>
      <span>Sputnik</span>
    </div>
    <div class="user-badge" id="userBadge" style="display:none;">
      <i class="fas fa-user-astronaut"></i>
      <span class="email" id="userEmail">user@mail.com</span>
      <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="content">
    <div class="chat-list" id="chatList">
      <div class="chat-list-title">
        <span><i class="fas fa-comments"></i>Чаты</span>
        <span id="chatCount">0</span>
      </div>
      <div id="chatItems">
        <div class="empty-chats">
          <i class="fas fa-inbox"></i>
          нет чатов 😔
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">
        <div class="partner" id="activePartner">
          <i class="fas fa-user"></i> выберите чат
        </div>
      </div>

      <div class="add-chat-row">
        <input type="email" id="newChatEmail" placeholder="✉️ email собеседника" />
        <button id="addChatBtn"><i class="fas fa-plus-circle"></i> Новый чат</button>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="empty-messages">
          <i class="fas fa-comment-dots"></i>
          <span>здесь будут сообщения 💭</span>
        </div>
      </div>

      <form class="send-form" id="sendForm">
        <input type="text" id="messageInput" placeholder="✍️ напишите сообщение..." autocomplete="off" />
        <button type="submit" id="sendBtn"><i class="fas fa-paper-plane"></i> Отправить</button>
      </form>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <i class="fas fa-rocket"></i> готов к полёту! 🚀
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    getDocs,
    onSnapshot,
    orderBy,
    serverTimestamp,
    updateDoc,
    doc,
    getDoc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ----- КОНФИГ -----
  const firebaseConfig = {
    apiKey: "AIzaSyBjvB9O3hsn4en7oexjDNr_Ad30LorEJYA",
    authDomain: "sputnik-e9f74.firebaseapp.com",
    projectId: "sputnik-e9f74",
    storageBucket: "sputnik-e9f74.firebasestorage.app",
    messagingSenderId: "426394306019",
    appId: "1:426394306019:web:df8ea34fef8be3877f4cd6",
    measurementId: "G-C20YYXMCQM"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ----- DOM -----
  const userBadge = document.getElementById('userBadge');
  const userEmailSpan = document.getElementById('userEmail');
  const logoutBtn = document.getElementById('logoutBtn');
  const chatItems = document.getElementById('chatItems');
  const chatCount = document.getElementById('chatCount');
  const activePartner = document.getElementById('activePartner');
  const messagesContainer = document.getElementById('messagesContainer');
  const statusBar = document.getElementById('statusBar');
  const addChatBtn = document.getElementById('addChatBtn');
  const newChatEmail = document.getElementById('newChatEmail');
  const sendForm = document.getElementById('sendForm');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  // ----- СОСТОЯНИЕ -----
  let currentUser = null;
  let currentUserEmail = '';
  let chats = [];
  let activeChatId = null;
  let activeChatEmail = '';
  let messagesUnsubscribe = null;

  function setStatus(msg, type = 'info') {
    statusBar.innerHTML = msg;
    statusBar.className = 'status-bar';
    if (type === 'success') statusBar.classList.add('success');
    if (type === 'error') statusBar.classList.add('error');
    if (type === 'info') statusBar.classList.add('info');
    console.log(`[STATUS] ${type}: ${msg}`);
  }

  function renderChats() {
    if (!chats.length) {
      chatItems.innerHTML = `<div class="empty-chats"><i class="fas fa-inbox"></i>нет чатов 😔</div>`;
      chatCount.textContent = '0';
      return;
    }
    let html = '';
    chats.forEach(chat => {
      const activeClass = chat.id === activeChatId ? 'active' : '';
      html += `
        <div class="chat-item ${activeClass}" data-chatid="${chat.id}">
          <i class="fas fa-user-circle"></i>
          <span class="chat-email">${chat.email}</span>
        </div>
      `;
    });
    chatItems.innerHTML = html;
    chatCount.textContent = chats.length;

    document.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.chatid;
        const found = chats.find(c => c.id === id);
        if (found) {
          activeChatId = id;
          activeChatEmail = found.email;
          activePartner.innerHTML = `<i class="fas fa-user"></i> ${found.email}`;
          loadMessages(id);
          renderChats();
        }
      });
    });
  }

  async function loadMessages(chatId) {
    if (messagesUnsubscribe) {
      messagesUnsubscribe();
      messagesUnsubscribe = null;
    }

    messagesContainer.innerHTML = '';

    try {
      const q = query(
        collection(db, 'chats', chatId, 'messages'),
        orderBy('timestamp', 'asc')
      );

      messagesUnsubscribe = onSnapshot(q, (snapshot) => {
        messagesContainer.innerHTML = '';
        let hasMessages = false;

        snapshot.forEach(doc => {
          hasMessages = true;
          const data = doc.data();
          const isSent = data.sender === currentUserEmail;
          const time = data.timestamp?.toDate?.() || new Date();
          const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          // Создаём обёртку для сообщения
          const wrapper = document.createElement('div');
          wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;

          // Создаём само сообщение
          const msgDiv = document.createElement('div');
          msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
          
          // Если сообщение от собеседника — показываем его email
          let senderHtml = '';
          if (!isSent && data.senderEmail) {
            senderHtml = `<span class="msg-sender">${data.senderEmail}</span>`;
          }
          
          msgDiv.innerHTML = `
            ${senderHtml}
            ${data.text}
            <span class="msg-time">${timeStr}</span>
          `;
          
          wrapper.appendChild(msgDiv);
          messagesContainer.appendChild(wrapper);
        });

        if (!hasMessages) {
          messagesContainer.innerHTML = `
            <div class="empty-messages">
              <i class="fas fa-comment-dots"></i>
              <span>начните общение 💬</span>
            </div>
          `;
        }

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, (error) => {
        console.error('❌ onSnapshot error:', error);
        setStatus('❌ Ошибка загрузки сообщений: ' + error.message, 'error');
      });

    } catch (e) {
      console.error('❌ loadMessages error:', e);
      setStatus('❌ Ошибка загрузки сообщений: ' + e.message, 'error');
    }
  }

  async function sendMessage(text) {
    if (!activeChatId) {
      setStatus('⚠️ Сначала выберите чат', 'error');
      return;
    }
    if (!text.trim()) {
      setStatus('✍️ Напишите что-нибудь', 'error');
      return;
    }
    if (!currentUserEmail) {
      setStatus('❌ Вы не авторизованы', 'error');
      return;
    }

    try {
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';

      await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
        text: text.trim(),
        sender: currentUserEmail,
        senderEmail: currentUserEmail,
        timestamp: serverTimestamp()
      });

      await updateDoc(doc(db, 'chats', activeChatId), {
        lastMessage: text.trim(),
        lastMessageTime: serverTimestamp()
      });

      messageInput.value = '';
      setStatus('✅ Сообщение отправлено! 🚀', 'success');
      setTimeout(() => setStatus('💬 готов к общению', 'info'), 1500);

    } catch (e) {
      console.error('❌ sendMessage error:', e);
      setStatus('❌ Ошибка отправки: ' + e.message, 'error');
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить';
    }
  }

  async function loadChats(userEmail) {
    if (!userEmail) return;
    try {
      console.log('🔄 Загрузка чатов для:', userEmail);
      const q = query(collection(db, 'chats'), where('participants', 'array-contains', userEmail));
      const snapshot = await getDocs(q);
      chats = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        const other = data.participants.find(p => p !== userEmail);
        chats.push({
          id: doc.id,
          email: other || 'unknown',
          lastMessage: data.lastMessage || ''
        });
      });
      console.log('✅ Загружено чатов:', chats.length);
      renderChats();
      
      if (chats.length > 0 && !activeChatId) {
        activeChatId = chats[0].id;
        activeChatEmail = chats[0].email;
        activePartner.innerHTML = `<i class="fas fa-user"></i> ${chats[0].email}`;
        loadMessages(activeChatId);
        renderChats();
      }
    } catch (e) {
      console.error('❌ loadChats error:', e);
      setStatus('❌ Ошибка загрузки чатов: ' + e.message, 'error');
    }
  }

  function subscribeToChats(userEmail) {
    if (!userEmail) return;
    console.log('🔄 Подписка на чаты для:', userEmail);
    const q = query(collection(db, 'chats'), where('participants', 'array-contains', userEmail));
    onSnapshot(q, (snapshot) => {
      const newChats = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        const other = data.participants.find(p => p !== userEmail);
        const existing = chats.find(c => c.id === doc.id);
        newChats.push({
          id: doc.id,
          email: other || 'unknown',
          lastMessage: data.lastMessage || '',
          unreadCount: existing?.unreadCount || 0
        });
      });
      chats = newChats;
      console.log('🔄 Обновлено чатов в реальном времени:', chats.length);
      renderChats();
      
      if (chats.length > 0 && !activeChatId) {
        activeChatId = chats[0].id;
        activeChatEmail = chats[0].email;
        activePartner.innerHTML = `<i class="fas fa-user"></i> ${chats[0].email}`;
        loadMessages(activeChatId);
        renderChats();
      }
    }, (error) => {
      console.error('❌ onSnapshot chats error:', error);
      setStatus('❌ Ошибка подписки на чаты: ' + error.message, 'error');
    });
  }

  async function addNewChat(partnerEmail) {
    console.log('🔄 addNewChat called with:', partnerEmail);
    console.log('🔄 currentUserEmail:', currentUserEmail);
    
    if (!currentUserEmail) {
      setStatus('❌ Вы не авторизованы', 'error');
      console.log('❌ Ошибка: пользователь не авторизован');
      return;
    }
    if (partnerEmail === currentUserEmail) {
      setStatus('😄 Нельзя создать чат с самим собой!', 'error');
      console.log('❌ Ошибка: нельзя создать чат с самим собой');
      return;
    }
    if (!partnerEmail || !partnerEmail.includes('@')) {
      setStatus('❌ Введите корректный email', 'error');
      console.log('❌ Ошибка: некорректный email');
      return;
    }

    const existing = chats.find(c => c.email === partnerEmail);
    if (existing) {
      setStatus('💚 Чат уже существует!', 'success');
      console.log('ℹ️ Чат уже существует:', existing.id);
      activeChatId = existing.id;
      activeChatEmail = existing.email;
      activePartner.innerHTML = `<i class="fas fa-user"></i> ${existing.email}`;
      loadMessages(activeChatId);
      renderChats();
      return;
    }

    try {
      console.log('📝 Создаю чат с:', partnerEmail);
      
      const usersQuery = query(collection(db, 'users'), where('email', '==', partnerEmail));
      const userSnapshot = await getDocs(usersQuery);
      
      if (userSnapshot.empty) {
        setStatus('❌ Пользователь с таким email не найден', 'error');
        console.log('❌ Пользователь не найден:', partnerEmail);
        return;
      }
      
      const chatData = {
        participants: [currentUserEmail, partnerEmail],
        createdAt: serverTimestamp(),
        lastMessage: null,
        lastMessageTime: null,
        type: 'private'
      };
      
      console.log('📤 Отправляю данные чата:', chatData);
      
      const chatRef = await addDoc(collection(db, 'chats'), chatData);
      console.log('✅ Чат создан с ID:', chatRef.id);

      const newChat = { id: chatRef.id, email: partnerEmail, unreadCount: 0 };
      chats.push(newChat);
      activeChatId = chatRef.id;
      activeChatEmail = partnerEmail;
      activePartner.innerHTML = `<i class="fas fa-user"></i> ${partnerEmail}`;
      loadMessages(activeChatId);
      renderChats();
      setStatus(`🎉 Чат с ${partnerEmail} создан!`, 'success');
      newChatEmail.value = '';
      
    } catch (e) {
      console.error('❌ ПОЛНАЯ ОШИБКА создания чата:', e);
      console.error('❌ Код ошибки:', e.code);
      console.error('❌ Сообщение:', e.message);
      
      let errorMessage = e.message;
      if (e.code === 'permission-denied') {
        errorMessage = 'Нет прав доступа. Проверьте правила Firestore.';
      } else if (e.code === 'not-found') {
        errorMessage = 'Коллекция не найдена. Создайте коллекцию "chats" в Firestore.';
      } else if (e.code === 'invalid-argument') {
        errorMessage = 'Некорректные данные. Проверьте поля документа.';
      }
      
      setStatus(`❌ Ошибка создания чата: ${errorMessage}`, 'error');
    }
  }

  // ----- AUTH STATE -----
  onAuthStateChanged(auth, async (user) => {
    console.log('🔄 onAuthStateChanged:', user?.email || 'не авторизован');
    
    if (user) {
      currentUser = user;
      currentUserEmail = user.email;
      userBadge.style.display = 'flex';
      userEmailSpan.textContent = user.email;
      setStatus(`👋 Привет, ${user.email}! 🌟`, 'success');
      
      try {
        const userRef = doc(db, 'users', user.uid);
        const userDoc = await getDoc(userRef);
        if (!userDoc.exists()) {
          await setDoc(userRef, {
            email: user.email,
            displayName: user.displayName || 'Пользователь',
            createdAt: serverTimestamp()
          });
          console.log('✅ Пользователь создан в Firestore');
        }
      } catch (e) {
        console.warn('⚠️ Ошибка создания пользователя:', e);
      }
      
      await loadChats(user.email);
      subscribeToChats(user.email);
    } else {
      currentUser = null;
      currentUserEmail = '';
      userBadge.style.display = 'none';
      chatItems.innerHTML = `<div class="empty-chats"><i class="fas fa-lock"></i> войдите для доступа 🔑</div>`;
      chatCount.textContent = '0';
      activePartner.innerHTML = `<i class="fas fa-user"></i> не авторизован`;
      messagesContainer.innerHTML = `
        <div class="empty-messages">
          <i class="fas fa-sign-in-alt"></i>
          <span>войдите или зарегистрируйтесь 🚀</span>
        </div>
      `;
      
      statusBar.innerHTML = `
        <form id="quickAuthForm" style="display:flex; gap:0.6rem; width:100%; flex-wrap:wrap; justify-content:center; align-items:center;">
          <input type="email" id="authEmail" placeholder="✉️ Email" style="padding:0.5rem 1rem; border-radius:40px; border:1px solid rgba(80,200,120,0.1); background:rgba(20,50,35,0.2); color:#e2f0e8; font-family:inherit; flex:1; min-width:120px;">
          <input type="password" id="authPassword" placeholder="🔒 Пароль (6+)" style="padding:0.5rem 1rem; border-radius:40px; border:1px solid rgba(80,200,120,0.1); background:rgba(20,50,35,0.2); color:#e2f0e8; font-family:inherit; flex:1; min-width:100px;">
          <button type="submit" style="padding:0.5rem 1.8rem; border-radius:40px; border:none; background:linear-gradient(145deg,#3db86b,#1e8a4a); color:white; font-weight:700; cursor:pointer;">🚀 Войти</button>
        </form>
      `;

      document.getElementById('quickAuthForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!email || !password) { setStatus('✍️ Заполните все поля', 'error'); return; }
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          setStatus('🎉 Аккаунт создан! 🌟', 'success');
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            try {
              await signInWithEmailAndPassword(auth, email, password);
              setStatus('👋 С возвращением! 💚', 'success');
            } catch (loginErr) {
              setStatus('❌ ' + (loginErr.message || 'Ошибка входа'), 'error');
            }
          } else {
            setStatus('❌ ' + (err.message || 'Ошибка'), 'error');
          }
        }
      });
    }
  });

  // ----- СОБЫТИЯ -----
  logoutBtn.addEventListener('click', async () => {
    try {
      await signOut(auth);
      if (messagesUnsubscribe) { messagesUnsubscribe(); messagesUnsubscribe = null; }
      setStatus('👋 До новых встреч! ✨', 'info');
    } catch (e) {
      setStatus('❌ Ошибка выхода', 'error');
    }
  });

  addChatBtn.addEventListener('click', () => {
    const email = newChatEmail.value.trim();
    console.log('📝 Нажата кнопка "Новый чат" с email:', email);
    addNewChat(email);
  });
  
  newChatEmail.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { 
      e.preventDefault(); 
      console.log('📝 Enter в поле email');
      addChatBtn.click(); 
    }
  });

  sendForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = messageInput.value;
    sendMessage(text);
  });

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendForm.dispatchEvent(new Event('submit'));
    }
  });

  setStatus('🚀 Sputnik готов к общению! 💬', 'info');
  console.log('✅ Приложение загружено!');
</script>
</body>
</html>
