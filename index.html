<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sputnik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,700;14..32,900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f0a;
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
    }

    .sputnik {
      text-align: center;
      user-select: none;
    }

    /* основное слово */
    .sputnik__word {
      font-size: clamp(4.5rem, 18vw, 12rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(145deg, #e6f7ed 20%, #6fcf97 60%, #2d8f4e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 80px rgba(60, 210, 130, 0.15);
      transition: transform 0.3s ease;
    }

    .sputnik__word:hover {
      transform: scale(1.02);
    }

    /* акцентная линия под названием */
    .sputnik__line {
      width: 120px;
      height: 3px;
      margin: 1.2rem auto 0;
      background: linear-gradient(90deg, transparent, #6fcf97, transparent);
      border-radius: 4px;
      opacity: 0.7;
    }

    /* дополнительный лёгкий сабтекст — почти незаметный, но добавляет ритм */
    .sputnik__sub {
      margin-top: 1.8rem;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(130, 200, 160, 0.25);
      transition: color 0.3s ease;
    }

    .sputnik:hover .sputnik__sub {
      color: rgba(130, 200, 160, 0.5);
    }

    /* декоративная точка-спутник (минималистичный акцент) */
    .sputnik__dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #6fcf97;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 30px rgba(60, 210, 130, 0.3);
      animation: pulse-dot 3s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* небольшая стильная рамка-орбита (чисто декоративно) */
    .sputnik__orbit {
      width: 180px;
      height: 180px;
      margin: 2.5rem auto 0;
      border: 1px solid rgba(60, 200, 120, 0.08);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin-slow 30s linear infinite;
    }

    .sputnik__orbit::after {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #6fcf97;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 20px rgba(60, 210, 130, 0.25);
      opacity: 0.5;
    }

    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }

    /* адаптивность для совсем маленьких экранов */
    @media (max-width: 480px) {
      .sputnik__orbit {
        width: 130px;
        height: 130px;
        margin-top: 1.8rem;
      }
      .sputnik__line {
        width: 80px;
      }
      .sputnik__sub {
        font-size: 0.7rem;
        letter-spacing: 0.25em;
      }
    }
  </style>
</head>
<body>
  <div class="sputnik">
    <!-- только название + минимальные декоративные элементы -->
    <div class="sputnik__word">
      <span class="sputnik__dot"></span>Sputnik
    </div>
    <div class="sputnik__line"></div>
    <div class="sputnik__sub">орбитальный минимализм</div>
    <!-- лёгкая орбита как чистый визуальный ритм -->
    <div class="sputnik__orbit"></div>
  </div>
</body>
</html>
